name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CC: gcc-14
      CXX: g++-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake 4.2
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.2.2"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libasound2-dev \
            libcxxopts-dev \
            meson \
            ninja-build \
            libglib2.0-dev \
            libspa-0.2-dev \
            libpipewire-0.3-dev \
            liblua5.4-dev \
            libsystemd-dev \
            gcc-14 g++-14

      - name: Build and Install WirePlumber
        # Disables doc generation to speed up the CI pipeline.
        # Uses system lua rather than allowing meson to download its own.
        run: |
          git clone https://gitlab.freedesktop.org/pipewire/wireplumber.git
          cd wireplumber
          git checkout 0.5.14
          meson setup build \
            --prefix=/usr \
            --buildtype=release \
            -Dsystem-lua=true \
            -Dintrospection=disabled \
            -Ddoc=disabled
          
          meson compile -C build
          sudo meson install -C build

      - name: Verify Installation
        # Confirms pkg-config can locate the newly installed 0.5 package.
        run: |
          pkg-config --modversion wireplumber-0.5

      - name: Install glaze
        run: |
          git clone --depth=1 https://github.com/stephenberry/glaze.git /tmp/glaze
          cmake -S /tmp/glaze -B /tmp/glaze/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DGLAZE_ENABLE_TESTS=OFF
          sudo cmake --install /tmp/glaze/build

      - name: Install concurrentqueue
        run: |
          git clone --depth=1 https://github.com/cameron314/concurrentqueue.git /tmp/concurrentqueue
          cmake -S /tmp/concurrentqueue -B /tmp/concurrentqueue/build \
            -DCMAKE_BUILD_TYPE=Release
          sudo cmake --install /tmp/concurrentqueue/build

      - name: Build and Install RtMidi 7
        run: |
          git clone https://github.com/thestk/rtmidi.git
          cd rtmidi
          git checkout 6.0.0
          cmake -B ./build -DCMAKE_BUILD_TYPE=Release
          sudo cmake --install ./build        

      - name: Install magic_enum
        run: |
          git clone --depth=1 https://github.com/Neargye/magic_enum /tmp/magic_enum
          cmake -S /tmp/magic_enum -B /tmp/magic_enum/build \
            -DCMAKE_BUILD_TYPE=Release
          sudo cmake --install /tmp/magic_enum/build

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanoKontroller2-linux-x86_64
          path: build/nanoKontroller2
          if-no-files-found: error

      # --- Release steps (only on version tags) ---

      - name: Package (.deb)
        if: startsWith(github.ref, 'refs/tags/v')
        run: cmake --build build --target package

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: build/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

